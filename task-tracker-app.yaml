apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: task-tracker
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/CSmohmmadSH/task-tracker.git
    targetRevision: main
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: task-tracker
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true