services:
  db:
    image: postgres:16-alpine
    container_name: task-tracker-db
    environment:
      POSTGRES_DB: tasks
      POSTGRES_USER: tasks
      POSTGRES_PASSWORD: tasks
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tasks -d tasks"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: task-tracker-app
    ports:
      - "8000:8000"
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: tasks
      DB_USER: tasks
      DB_PASSWORD: tasks
      DB_STARTUP_RETRIES: "30"
      DB_STARTUP_DELAY_SECONDS: "2"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres-data:
