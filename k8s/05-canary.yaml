apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: task-tracker-gateway
  namespace: task-tracker
spec:
  gatewayClassName: istio
  listeners:
  - name: http
    port: 80
    protocol: HTTP
    allowedRoutes:
      namespaces:
        from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: task-tracker-route
  namespace: task-tracker
spec:
  parentRefs:
  - name: task-tracker-gateway
  rules:
  - backendRefs:
    - name: task-tracker-v1
      port: 80
      weight: 50
    - name: task-tracker-v2
      port: 80
      weight: 50